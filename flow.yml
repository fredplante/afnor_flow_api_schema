openapi: '3.0.3'

info:
  title: AFNOR Flow Service
  version: 1.3.0
  description: |
    The __Flow Service API__ allows to:
      - Upload a flow.
      - Retrieve information related to a set of flows.
      - Download a flow given its identifier

    The resources of the API are :
      - `/flows` : with creation and retrieval methods.
      - `/webhooks` : creation, update, delete, list

    Worflow example:
      - `POST /flows` : provide the flow information & content
      - `POST /flows/search` : retrieve flows given multiple criterias.
      - `GET /flows/{id}` : download a flow based on its id.
      - `POST /webhooks` : subscribe to a channel of event

    History:
      - `1.0.0` : First release
      - `1.0.1` : Fixes following 2025/04/15 SG5 plenary meeting
        - Remove AcknowledgementXXX enumerates from FlowType
        - Acknowledgement is now based upon details (level, item, reason)
        - Add the attachment number in the flow information
        - Add query parameters docType & docIndex to aim a specific download
        - Change pagination method, from cursors to offsets
      - `1.0.2` : Fixes following 2025/05/06 SG5 plenary meeting
        - FlowId & TrackingId as not only UUID for more flexibility
        - Add sha256 fingerprint to allow integrity check
        - Add trackingId as a filter criteria and in the Flow object
        - Add full FlowInfo object + submission date in POST response
        - Add comments
      - `1.1.0` : Fixes following 2025/05/20 SG5 meeting
        - Get operation: allows also to return the flow data when docType is set to Metadata
        - Search operation: flowId is no longer a criteria, prefer too use the Get by Id operation
        - Remove any reference to any attached document to the flow
        - Refactor FullFlowInfo schema
        - FlowType update (FRR 10.*) for reporting
        - AcknowledgementDetail update to add a message and a code
        - offset removal, do pagination using updatedAfter
        - remove 206 status code
        - Add StateInvoice & associated LC in FlowType enum
        - Add extensible reason codes related to Life cycle errors
        - Add ProcessingRule to the flow object & criteria
        - Add webhooks callback contents
      - `1.2.0` :
        - Webhook management, create, update, list, delete, get
        - Add new flow types: B2G, B2GInt, B2GOutOfScope
        - Add new client credentials OAuth2 workflow
        - Optimized FlowInfo/FullFlowInfo/Flow schemas
        - Add name in Flow schema
        - Add OAuth2 securityScheme
        - Add Header parameter Organization-Id to ease delegation
      - `1.3.0` :
        - Increase NotOnlyUuid to 64 characters
        - Update Webhook configuration:
          - remove processingRule from Metadata
          - remove any required metadata field (metadat can be empty)
          - remove authentication block

  contact:
    name: AFNOR
    email: sg5@afnor.org

servers:
  - url: 'https://{sub-domain}.{domain}/flow-service'
    variables:
      sub-domain:
        default: api.flow
        description: Sub domain related to the Flow API if any
      domain:
        default: company.com
        description: Domain name
    description: Prod public URLs

tags:
  - name: Flow
    description: Flow management
  - name: Supervisor
    description: Service supervision
  - name: Webhook
    description: Webhook management

security:
  - BearerAuth: []
  - OAuth2: []

paths:

  /v1/flows:
    post:
      operationId: createFlow
      summary: Submit a new flow
      description: |
        Submit a flow. A flow is a single-invoice file, with :
          - an XML/PDF file with the data of the invoice

        The flow is created with a `flowInfo` object, allowing to qualify the flow.

        A flow can be :
          - an invoice (CII, UBL, Factur-X,...)
          - a lifecycle (CDAR)
          - or a e-reporting file
      parameters:
        - $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/parameters/RequestIdHeader"
        - $ref: '#/components/parameters/organizationIdHeaderParam'
      requestBody:
        $ref: '#/components/requestBodies/FlowPostRequest'
      responses:
        '202':
          $ref: '#/components/responses/FlowPostResponse'
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '413':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error413Response"
        '422':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error422Response"
        '429':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error429Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"
      tags:
        - Flow

  /v1/flows/search:
    post:
      operationId: searchFlows
      summary: Select flows upon criteria
      description: |
        Retrieves a set of flows matching the provided search criteria:
          - Need at least one criterion to be specified
          - Assuming a logical AND when combining criteria
          - Assuming a logical OR for criteria allowing a list of values

        Pagination works with the updatedAfter property
        The comparison with current date is strict : updatedAt > updatedAfter
      parameters:
        - $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/parameters/RequestIdHeader"
        - $ref: '#/components/parameters/organizationIdHeaderParam'
      requestBody:
        $ref: '#/components/requestBodies/FlowSearchRequest'
      responses:
        '200':
          $ref: '#/components/responses/FlowSearchResponse'
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '429':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error429Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"
      tags:
        - Flow

  /v1/flows/{flowId}:
    get:
      summary: Download the file of a flow
      description: |
        Download a file related to a given flow:
          - an invoice
          - a life cycle
          - an e-reporting
      operationId: getFlow
      tags:
        - Flow
      parameters:
        - $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/parameters/RequestIdHeader"
        - $ref: '#/components/parameters/organizationIdHeaderParam'
        - name: flowId
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/NotOnlyUuid'
          description: Flow identifier
        - name: docType
          description: |
            This parameter allows to provide the type of file to be downloaded, can be either one:
              - Metadata [Default]: provides the flow metadata as a JSON payload, no download
              - Original: the document that has been initially sent/provided by the emitter
              - Converted: the document that has been optionally converted by the system
              - ReadableView: the document that has been optionally generated as the readable file
          in: query
          schema:
            type: string
            enum:
              - Metadata
              - Original
              - Converted
              - ReadableView
            default: Metadata
      responses:
        '200':
          $ref: '#/components/responses/FlowGetResponse'
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '404':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error404Response"
        '429':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error429Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"

  /v1/webhooks:
    parameters:
      - $ref : "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/parameters/RequestIdHeader"
      - $ref: '#/components/parameters/organizationIdHeaderParam'
    post:
      tags:
        - Webhook
      operationId: createWebhook
      summary: 'Subscribe to a webhook'
      description: |
        - Create a new webhook
        - With technical & security parameters
        - With metadata to filter on subsets
      requestBody:
        $ref: '#/components/requestBodies/WebhookPostRequest'
      responses:
        '201':
          $ref: '#/components/responses/WebhookLightResponse'
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"
      callbacks:
        WebhookCallback:
          $ref: '#/components/callbacks/WebhookCallback'
    get:
      tags:
        - Webhook
      operationId: listWebhooks
      summary: 'Retrieve the list of webhooks created by the owner of the token'
      responses:
        '200':
          $ref: '#/components/responses/WebhookListResponse'
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"

  /v1/webhooks/{webhookUid}:
    parameters:
      - $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/parameters/RequestIdHeader"
      - $ref: '#/components/parameters/webhookUidPathParam'
      - $ref: '#/components/parameters/organizationIdHeaderParam'
    patch:
      tags:
        - Webhook
      operationId: updateWebhook
      summary: 'Update a webhook subscription'
      description: |
        - Update the technical configuration of a webhook, keeping the same Metadata
        - The operation is allowed only buy the owner of the token
      requestBody:
        $ref: '#/components/requestBodies/WebhookPatchRequest'
      responses:
        '204':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Ok204EmptyResponse"
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"
        '404':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error404Response"
    delete:
      tags:
        - Webhook
      operationId: deleteWebhook
      summary: 'Unsubscribe to a webhook'
      description: |
        - Delete a subscription owned by the owner of the token
        - The operation is allowed only buy the owner of the token
      responses:
        '204':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Ok204EmptyResponse"
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"
        '404':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error404Response"
    get:
      tags:
        - Webhook
      operationId: getWebhook
      summary: 'Get a webhook content'
      description: |
        - Get a subscription owned by the owner of the token
        - The operation is allowed only buy the owner of the token
      responses:
        '200':
          $ref: '#/components/responses/WebhookFullResponse'
        '400':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
        '401':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
        '403':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"
        '404':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error404Response"

  /v1/healthcheck:
    get:
      operationId: getHealth
      summary: Check whether the API service is up and running.
      tags:
        - Supervisor
      parameters:
        - $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/parameters/RequestIdHeader"
        - $ref: '#/components/parameters/organizationIdHeaderParam'
      responses:
        '200':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Ok200EmptyResponse"
        '500':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"
        '503':
          $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error503Response"


components:

  parameters:

    webhookUidPathParam:
      name: webhookUid
      in: path
      description: The webhook unique ID
      required: true
      schema:
        $ref: '#/components/schemas/WebhookId'

    organizationIdHeaderParam:
      name: Organization-Id
      in: header
      description: The organization that is aimed in a multi tenancy context
      required: false
      schema:
        type: string

  schemas:

    NotOnlyUuid:
      description: Unique identifier supporting UUID but not only, for flexibility purpose
      type: string
      maxLength: 36

    ProcessingRule:
      type: string
      description: |
        - B2B                 : e-invoicing
        - B2BInt              : International B2B e-reporting
        - B2C                 : B2C e-reporting
        - B2G                 : e-invoicing for B2G sales
        - B2GInt
        - OutOfScope          : Out of scope (not regulated flow)
        - B2GOutOfScope
        - ArchiveOnly         : Archive only, no transmission
        - NotApplicable       : Not Applicable
      enum:
        - B2B
        - B2BInt
        - B2C
        - B2G
        - B2GInt
        - OutOfScope
        - B2GOutOfScope
        - ArchiveOnly
        - NotApplicable

    FlowSyntax:
      type: string
      description: Syntax of the original file belonging to a flow
      enum:
        - CII       # Invoice
        - UBL       # Invoice
        - Factur-X  # Invoice
        - CDAR      # Any Life Cycle
        - FRR       # E-Reporting
      example: CII

    FlowProfile:
      type: string
      enum:
        - Basic
        - CIUS
        - Extended-CTC-FR

    FlowType:
      description: |
        - `CustomerInvoice`: a non-self-billed outgoing invoice or a self-billed incoming invoice
        - `SupplierInvoice`: a non-self-billed incoming invoice or self-billed outgoing invoice
        - `StateInvoice`: an invoice Flow sent to DFH
        - `CustomerInvoiceLC`: a lifecycle (CDAR) related to a customer invoice
        - `SupplierInvoiceLC`: a lifecycle (CDAR) related to supplier invoice
        - `StateCustomerInvoiceLC`: a customer invoice LC sent to DFH
        - `StateSupplierInvoiceLC`: a supplier invoice LC sent to DFH
        - `AggregatedCustomerTransactionReport` : a transaction E-Reporting flow containing aggregated B2C sales (FRR 10.3)
        - `IndividualCustomerTransactionReport`: a transaction E-Reporting flow containing international B2B sales or a B2C transaction flow reported individually (FRR 10.1)
        - `AggregatedCustomerPaymentReport` : a E-Reporting of collections flow containing collections linked to B2C sales (FRR 10.4)
        - `UnitaryCustomerPaymentReport` : an E-Reporting of collections flow containing collections linked to unit international B2B sales or B2C sales (FRR 10.2)
        - `UnitarySupplierTransactionReport`: a transaction E-Reporting flow containing international B2B purchases (FRR 10.1)
        - `MultiFlowReport`: an E-Reporting flow which contains at least 2 different flow types (FRR 10)
      type: string
      enum:
        - CustomerInvoice
        - SupplierInvoice
        - StateInvoice
        - CustomerInvoiceLC
        - SupplierInvoiceLC
        - StateCustomerInvoiceLC
        - StateSupplierInvoiceLC
        - AggregatedCustomerTransactionReport
        - UnitaryCustomerTransactionReport
        - AggregatedCustomerPaymentReport
        - UnitaryCustomerPaymentReport
        - UnitarySupplierTransactionReport
        - MultiFlowReport
      example: SupplierInvoice

    FlowDirection:
      type: string
      description: |
        Direction of the flow:
          - `In`:  Incoming flow, from the PDP to the OD
          - `Out`: Outgoing flow, from the OD to the PDP
      enum:
        - In
        - Out
      example: Out

    FlowAckStatus:
      description: |
        - `Ok`: the following checks have passed:
          - Anti virus
          - Integrity checks
          - Technical rules checks
          - Unicity checks
        - `Error`: one of the previous test has failed
        - `Pending` : the flow is not yet integrated
      type: string
      enum:
        - Pending
        - Ok
        - Error

    ReasonCode:
      description: "A predefined set of reason code values + ability to extend this set"
      oneOf:
        - $ref: '#/components/schemas/ReasonCodeEnum'
        - type: string

    ReasonCodeEnum:
      description: |
        - `EmptyAttachement`      : One or more attachments are empty. (ie IRR_VID_PJ)
        - `AttachmentTypeError`   : The type and/or extension of one or more attachments is not compliant. (ie IRR_EXT_DOC)
        - `EmptyFlow`             : The binary flow is empty. (ie IRR_VID_F)
        - `OtherTechnicalError`   : Other technical error. (ie AUTRE)
        - `InvalidSchema`         : Invalid XML schema. (ie IRR_SYNTAX)
        - `FileSizeExceeded`      : File size limit reached. (ie IRR_TAILLE_F)
        - `FlowTypeError`         : The flow type and/or extension are not compliant. (ie IRR_TYPE_F)
        - `AlreadyExistingFlow`   : The flow has already been sent and received. (ie N/A)
        - `VirusFound`            : Presence of a virus. (ie IRR_ANTIVIRUS)
        - `ChecksumMismatch`      : Checksum provided is different from computed one
        - `InvoiceLCInvalidStatus`: One or more statuses are inconsistent
        - `InvoiceLCStatusError`  : One or more statuses are incorrect or not allowed
        - `InvoiceLCRuleError`    : One or more rules are not matched
        - `InvoiceLCAccessDenied` : One of the request is not authorized and requests permissions
        - `InvoiceLCAmountError`  : One or more amounts are not consistent in regards to the VAT
      type: string
      enum:
        - EmptyAttachement
        - AttachmentTypeError
        - EmptyFlow
        - OtherTechnicalError
        - InvalidSchema
        - FileSizeExceeded
        - FlowTypeError
        - AlreadyExistingFlow
        - VirusFound
        - ChecksumMismatch
        - InvoiceLCInvalidStatus
        - InvoiceLCStatusError
        - InvoiceLCRuleError
        - InvoiceLCAccessDenied
        - InvoiceLCAmountError

    Algorithm:
      type: string
      enum:
        - RS256
        - HS256
        - ECDSA
        - EDDSA_25519
        - RSA_PSS
        - EDDSA_448
        -
    CoreFlowInfo:
      description: Core schema to build FlowInfo, FullFlowInfo, Flow schemas
      type: object
      required:
        - name
        - flowSyntax
      properties:
        trackingId:
          description: 'The tracking id is an external identifier and is used to track the flow by the sender'
          allOf:
            - $ref: '#/components/schemas/NotOnlyUuid'
        name:
          description: "Name of the file"
          type: string
          maxLength: 255
        processingRule:
          $ref: '#/components/schemas/ProcessingRule'
        flowSyntax:
          $ref: '#/components/schemas/FlowSyntax'
        flowProfile:
          $ref: '#/components/schemas/FlowProfile'

    FlowInfoExtension:
      description: Extension to build the FlowInfo
      type: object
      properties:
        sha256:
          description: |
            The sha256 is the fingerprint of the attached file:
            - if provided in the request: it should be checked once received
            - if not provided in the request: it may be computed and returned in the response
          type: string
          format: byte
          pattern: "^[a-f0-9]{64}$"

    FlowInfo:
      description: 'Signaling of the flow'
      allOf:
        - $ref: '#/components/schemas/CoreFlowInfo'
        - $ref: '#/components/schemas/FlowInfoExtension'

    SearchFlowParams:
      type: object
      required:
        - where
      properties:
        limit:
          type: integer
          maximum: 100
          default: 25
          description: Maximum number of results that may be returned
        where:
          $ref: '#/components/schemas/SearchFlowFilters'

    SearchFlowFilters:
      description: Filtering criteria, at least one is required
      type: object
      properties:
        updatedAfter:
          description: 'The comparison with current date is strict : updatedAt > updatedAfter'
          type: string
          format: date-time
        updatedBefore:
          type: string
          format: date-time
        processingRule:
          type: array
          items:
            $ref: '#/components/schemas/ProcessingRule'
        flowType:
          type: array
          items:
            $ref: '#/components/schemas/FlowType'
        flowDirection:
          type: array
          items:
            $ref: '#/components/schemas/FlowDirection'
        trackingId:
          $ref: '#/components/schemas/NotOnlyUuid'
        ackStatus:
          $ref: '#/components/schemas/FlowAckStatus'

    FullFlowInfoExtension:
      description: 'Extension schema to build FFullFlowInfo, Flow schemas'
      type: object
      required:
        - flowId
        - submittedAt
      properties:
        flowId:
          $ref: '#/components/schemas/NotOnlyUuid'
        submittedAt:
          description: |
            The flow submission date and time (the date and time when the flow was created on the system)
            This property should be used by the API consumer as a time reference to avoid clock synchronization issues
          type: string
          format: date-time

    FullFlowInfo:
      description: 'Identified Flow info: flow info + id + timestamp'
      allOf:
        - $ref: '#/components/schemas/FullFlowInfoExtension'
        - $ref: '#/components/schemas/FlowInfo'

    AcknowledgementDetail:
      type: object
      required:
        - level
        - item
        - reasonCode
        - reasonMessage
      properties:
        level:
          type: string
          enum:
            - Error
            - Warning
        item:
          description: "Item on which the error refers"
          type: string
        reasonCode:
          $ref: '#/components/schemas/ReasonCode'
        reasonMessage:
          type: string

    AcknowledgementDetails:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/AcknowledgementDetail'

    Acknowledgement:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/FlowAckStatus'
        details:
          $ref: '#/components/schemas/AcknowledgementDetails'

    FlowExtension:
      description: 'Extension schema to build Flow schema'
      type: object
      required:
        - updatedAt
        - flowType
        - processingRuleSource
        - flowDirection
        - acknowledgement
      properties:
        updatedAt:
          description: |
            The last update date and time of the flow. When the flow is submitted updatedAt is equal to submittedAt.
            When the flow acknowledgment status is changed updatedAt date and time is updated.
          type: string
          format: date-time
        flowType:
          $ref: '#/components/schemas/FlowType'
        processingRuleSource:
          description: "Says whether the processing rule has been computed or the processing rule was an input parameter"
          type: string
          enum:
            - Input
            - Computed
        flowDirection:
          $ref: '#/components/schemas/FlowDirection'
        acknowledgement:
          $ref: '#/components/schemas/Acknowledgement'

    Flow:
      description: The properties of a Flow resource
      allOf:
        - $ref: '#/components/schemas/CoreFlowInfo'
        - $ref: '#/components/schemas/FullFlowInfoExtension'
        - $ref: '#/components/schemas/FlowExtension'

    SearchFlowContent:
      description: A set of flows matching criterias, provided into the request
      type: object
      properties:
        limit:
          type: integer
        filters:
          $ref: '#/components/schemas/SearchFlowFilters'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Flow'

    CallbackParameters:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
        headers:
          type: array
          items:
            $ref: '#/components/schemas/CallbackHeader'
        signature:
          $ref: '#/components/schemas/CallbackSignature'

# Differentes options:
# Avec les headers il faudrait eviter que des header standards soient surchargés
# L'echange de secret : OK mais il faudrait eviter qu'il soit passé à chaque appel, il faudrait a minima chiffrer un challenge avec la clef
# A t'on une problématique que l'integrité
# A t'on une problemeatique sur l'authenticité

    CallbackHeader:
      type: object
      required:
        - headerName
        - headerValue
      properties:
        headerName:
          type: string
        headerValue:
          type: string

    CallbackSignature:
      type: object
      required:
        - algo
        - key
      properties:
        algo:
          $ref: '#/components/schemas/Algorithm'
        key:
          description: Base 64 encoded string
          type: string
          format: byte

    WebhookMetadata:
      type: object
      properties:
        flowTypes:
          type: array
          items:
            $ref: '#/components/schemas/FlowType'
        flowDirection:
          $ref: '#/components/schemas/FlowDirection'
        ackStatus:
          $ref: '#/components/schemas/FlowAckStatus'

    WebhookParams:
      type: object
      required:
        - callback
        - metadata
      properties:
        callback:
          $ref: '#/components/schemas/CallbackParameters'
        metadata:
          $ref: '#/components/schemas/WebhookMetadata'

    WebhookId:
      type: string
      format: uuid

    WebhookIdParam:
      type: object
      properties:
        webhookId:
          $ref: '#/components/schemas/WebhookId'

    Webhook:
      allOf:
        - $ref: '#/components/schemas/WebhookIdParam'
        - $ref: '#/components/schemas/WebhookParams'

    WebhookPatchPayload:
      type: object
      properties:
        headers:
          type: array
          items:
            $ref: '#/components/schemas/CallbackHeader'
        signature:
          $ref: '#/components/schemas/CallbackSignature'


  callbacks:

    WebhookCallback:
      '{$request.body#/callback.url}':   # The callback URL, refers to the provided URL
        post:
          parameters:
            - name: Signature
              description: |
                The signature field is required whenever the callback properties hold a signature block
                - what content is considered into the signature ? body, headers, timestamp
                - how is the signed content serialized ? Do we need a canonical form ?
              required: false
              in: header
              schema:
                description: Base 64 encoded string
                type: string
                format: byte
          requestBody:   # Contents of the callback message
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Flow'
          responses:   # Expected responses to the callback message
            '200':
              $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Ok200EmptyResponse"
            '400':
              $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error400Response"
            '401':
              $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error401Response"
            '403':
              $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error403Response"
            '500':
              $ref: "https://api.swaggerhub.com/domains/Generixgroup8/AFNOR-Common/1.0.0#/components/responses/Error500Response"

  requestBodies:

    FlowSearchRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchFlowParams'

    FlowPostRequest:
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - flowInfo
              - file
            properties:
              flowInfo:
                $ref: '#/components/schemas/FlowInfo'
              file:
                description: 'Flow file: Max size = 100 MB'
                type: string
                format: binary
          encoding:
            file:
              contentType: application/pdf, application/xml
            flowInfo:
              contentType: application/json

    WebhookPostRequest:
      description: Create a webhook
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookParams'

    WebhookPatchRequest:
      description: Update a webhook's technical parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookPatchPayload'

  responses:

    FlowSearchResponse:
      description: |
        OK - Response message when returning the results of a search request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SearchFlowContent'

    FlowPostResponse:
      description: |
        OK - Response message once the flow has been uploaded.
      content:
        application/json:
          schema:
            type: object
            properties:
              flowId:
                $ref: '#/components/schemas/NotOnlyUuid'
              submittedAt:
                description: |
                  The flow submission date and time (the date and time when the flow was created on the system)
                  This property should be used by the API consumer as a time reference to avoid clock synchronization issues
                type: string
                format: date-time
              trackingId:
                description: 'The tracking id is an external identifier and is used to track the flow by the sender'
                type: string
                maxLength: 64
                nullable: true
              name:
                description: Name of the file
                type: string
                maxLength: 255
              processingRule:
                type: string
                description: |
                  - B2B                 : e-invoicing
                  - B2BInt              : International B2B e-reporting
                  - B2C                 : B2C e-reporting
                  - B2G                 : e-invoicing for B2G sales
                  - B2GInt
                  - OutOfScope          : Out of scope (not regulated flow)
                  - B2GOutOfScope
                  - ArchiveOnly         : Archive only, no transmission
                  - NotApplicable       : Not Applicable
                enum:
                  - B2B
                  - B2BInt
                  - B2C
                  - B2G
                  - B2GInt
                  - OutOfScope
                  - B2GOutOfScope
                  - ArchiveOnly
                  - NotApplicable
                nullable: true
              flowSyntax:
                $ref: '#/components/schemas/FlowSyntax'
              flowProfile:
                type: string
                enum:
                  - Basic
                  - CIUS
                  - Extended-CTC-FR
                nullable: true
              sha256:
                description: |
                  The sha256 is the fingerprint of the attached file:
                  - if provided in the request: it should be checked once received
                  - if not provided in the request: it may be computed and returned in the response
                type: string
                format: byte
                pattern: "^[a-f0-9]{64}$"
            required:
              - flowId
              - submittedAt
              - trackingId
              - name
              - processingRule
              - flowSyntax
              - flowProfile
              - sha256


    FlowGetResponse:
      description : OK - Response message once the flow has been downloaded.
      headers:
        Content-Disposition:
          description: Header specifying attached file name
          schema:
            type: string
            pattern: 'attachment;filename=*'
      content:
        application/octet-stream: {}
        application/json:
          schema:
            $ref: '#/components/schemas/Flow'

    WebhookLightResponse:
      description: 'OK - Webhook Created'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookIdParam'

    WebhookFullResponse:
      description: 'OK - Webhook Retrieved'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Webhook'

    WebhookListResponse:
      description: 'OK - Webhook Id List Response'
      content:
        application/json:
          schema:
            type: object
            required:
              - webhookIds
            properties:
              webhookIds:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookId'

  securitySchemes:

    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    OAuth2:
      type: oauth2
      description: 'Implements only OAuth2 Client Credentials workflow requiring a client id/secret pair'
      flows:
        clientCredentials:
          tokenUrl: 'https://auth.company.com/auth-service/{custId}/token'
          scopes : {}
